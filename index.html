<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChaiCode Cinema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: "Outfit", sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<!-- AUTH SCREEN -->
<div id="authScreen" class="bg-slate-800 p-8 rounded-2xl w-full max-w-md">
  <h2 class="text-2xl mb-6 text-center font-bold">Login / Register</h2>

  <input id="name" placeholder="Name (for register)" class="w-full mb-3 p-2 rounded bg-slate-700"/>
  <input id="email" placeholder="Email" class="w-full mb-3 p-2 rounded bg-slate-700"/>
  <input id="password" type="password" placeholder="Password" class="w-full mb-4 p-2 rounded bg-slate-700"/>

  <div class="flex gap-3">
    <button onclick="register()" class="flex-1 bg-emerald-500 p-2 rounded">Register</button>
    <button onclick="login()" class="flex-1 bg-blue-500 p-2 rounded">Login</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="hidden max-w-7xl w-full bg-slate-800 p-10 rounded-3xl">

  <div class="flex justify-between mb-6">
    <h1 class="text-2xl font-bold">🎬 ChaiCode Cinema</h1>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
  </div>

  <div class="flex justify-center mb-6">
    <table id="tbl" class="border-separate border-spacing-4"></table>
  </div>

</div>

<script>
const BASE_URL = "http://localhost:8080"; // backend

// ================= AUTH =================

function saveToken(token) {
  localStorage.setItem("token", token);
}

function getToken() {
  return localStorage.getItem("token");
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

async function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${BASE_URL}/auth/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();
  alert(data.message || "Registered");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    saveToken(data.token);
    initApp();
  } else {
    alert("Login failed");
  }
}

// ================= APP =================

async function loadSeats() {
  const tbl = document.getElementById("tbl");
  tbl.innerHTML = "";

  const res = await fetch(`${BASE_URL}/seats`);
  const seats = await res.json();

  let tr;
  for (let i = 0; i < seats.length; i++) {
    if (i % 8 === 0) tr = document.createElement("tr");

    const seat = seats[i];
    const td = document.createElement("td");

    const base =
      "w-24 h-24 rounded-xl text-center text-xl font-bold transition cursor-pointer";

    if (seat.isbooked) {
      td.className = `${base} bg-red-500/20 text-red-400 cursor-not-allowed`;
      td.innerText = seat.id;
    } else {
      td.className = `${base} bg-green-500 text-white hover:scale-110`;
      td.innerText = seat.id;

      td.onclick = () => bookSeat(seat.id);
    }

    tr.appendChild(td);
    tbl.appendChild(tr);
  }
}

async function bookSeat(id) {
  const token = getToken();

  const res = await fetch(`${BASE_URL}/book/${id}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
  } else {
    alert("Seat booked!");
    loadSeats();
  }
}

// ================= INIT =================

function initApp() {
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");
  loadSeats();
}

// Auto login if token exists
if (getToken()) {
  initApp();
}
</script>

</body>
</html>
